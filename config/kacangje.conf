# kacangje configuration
# Path: ~/.config/kacangje/kacangje.conf or $KACANGJE_DIR/config/kacangje.conf

[install]
# Auto-detect best model based on hardware
auto_detect_model = true

# Manual model override (empty = auto)
# model = malaysian-7b-dialect
# model = malaysian-1.5b-reasoning

# Minimum RAM (GB) to use 7B model
min_ram_7b = 8

# Minimum RAM (GB) to use 1.5B model (any 4GB+ machine)
min_ram_1_5b = 4

[models]
# Model registry — maps IDs to Ollama model names
default = malaysian-7b-dialect
fast = malaysian-1.5b-reasoning
code = qwen2.5:7b

[web]
host = 0.0.0.0
port = 8080
auto_open_browser = true
theme = light

[templates]
# Path to SME templates directory
dir = ${KACANGJE_DIR}/templates
auto_load = true

[actions]
# Path to action scripts
dir = ${KACANGJE_DIR}/actions
# Safety: require confirmation before running actions
require_confirmation = true
# Max execution time per action (seconds)
timeout = 30

[sme]
# Company name for invoices, templates, etc.
company_name = My SME
company_address = 

# Default language (ms = Malay, en = English, mix = Mix)
language = ms

# Enable usage stats collection (anonymized, local only)
enable_telemetry = false

[update]
# Check for updates on startup
check_on_start = true
# Update channel: stable, beta
channel = stable
